# joplin-mcp-server — Woodpecker CI Build + Deploy Pipeline
#
# Baut beide Images und pusht sie in die interne Registry,
# danach SSH-Deploy auf den Joplin-LXC.
#
# Secrets (org-level in Woodpecker):
#   SSH_DEPLOY_KEY  — privater Ed25519-Key
#   GITHUB_TOKEN    — GitHub PAT mit repo-Schreibrecht (für Mirror-Push)
#   FORGEJO_READ_TOKEN   — Forgejo PAT für Martin (für Mirror-Push)
#
# Einmaliges Setup auf dem Ziel-LXC (als root):
#   git config --global credential.helper store
#   printf "https://martin:FORGEJO_TOKEN@forgejo.home.msc.wtf\n" > ~/.git-credentials
#   git clone https://forgejo.home.msc.wtf/martin/HomeLab /srv/homelab
#   mkdir -p /srv/homelab/config/joplin-mcp
#   cp /srv/joplin-mcp/.env /srv/homelab/config/joplin-mcp/.env   # bestehende Werte übernehmen

when:
  - event: push
    branch: main

steps:

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    commands:
      - uv sync --frozen --extra dev --no-install-project
      - uv run pytest test/ -v

  # ── joplin-cli Image bauen ────────────────────────────────────────────────
  build-joplin-cli:
    image: gcr.io/kaniko-project/executor:debug
    commands:
      - /kaniko/executor
          --context $CI_WORKSPACE/joplin-cli
          --dockerfile $CI_WORKSPACE/joplin-cli/Dockerfile
          --destination 192.168.6.39:5000/joplin-cli:latest
          --insecure

  # ── joplin-mcp Image bauen ───────────────────────────────────────────────
  build-joplin-mcp:
    image: gcr.io/kaniko-project/executor:debug
    commands:
      - /kaniko/executor
          --context $CI_WORKSPACE
          --dockerfile $CI_WORKSPACE/Dockerfile
          --destination 192.168.6.39:5000/joplin-mcp:latest
          --insecure

  # ── SSH Deploy ────────────────────────────────────────────────────────────

  deploy:
    image: appleboy/drone-ssh
    settings:
      host: 192.168.6.178
      username: root
      key:
        from_secret: SSH_DEPLOY_KEY
      script:
        - git -C /srv/homelab fetch && git -C /srv/homelab reset --hard origin/main
        - docker compose -f /srv/homelab/services/joplin-mcp/docker-compose.yml --project-name joplin-mcp --env-file /srv/homelab/config/joplin-mcp/.env up -d --pull always

  # ── Mirror to GitHub ──────────────────────────────────────────────────────
  sync-github:
    image: alpine/git
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
      FORGEJO_READ_TOKEN:
        from_secret: FORGEJO_READ_TOKEN
    commands:
      - git clone --mirror https://oauth2:$FORGEJO_READ_TOKEN@forgejo.home.msc.wtf/martin/joplin-mcp-server.git /tmp/mirror
      - cd /tmp/mirror && git push --mirror https://keineantwort:$GITHUB_TOKEN@github.com/keineantwort/joplin-mcp-server.git
